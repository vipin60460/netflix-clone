<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=], initial-scale=1.0">
    <title>Netflex clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <header class="hero">

           <div class="overlay"></div>

           <nav class="navbar">

            <div class="hero-content">

                <h1>
                    Unlimited movies, T.V shows and more.
                </h1>

                <h3>Starts at 149, Cancel at anytime.</h3>

                <p>Enter your email to start or resume your membership.</p>
                <div class="email-signup">
                    <input type="email"
                            placeholder="Email address"
                    >

                    <button>
                        get started &gt;
                    </button>

                </div>
                
            </div>
            
            <img src="assets/images/logo.png" alt="Netflix logo" class="logo">

            <div class="nav-right">

                <select class="language">
                    <option>English</option>
                    <option>Hindi</option>
                </select>
                <button class="Sign-in">Sign-in</button>
            </div>

           </nav>

        </header>

    </div>

    <script src="script.js"></script>
</body>
</html>
